# Build explicite via Docker : l’image finale contient toujours `dist/`.
# https://docs.railway.com/reference/config-as-code
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Déjà défini par CMD dans le Dockerfile ; on garde une commande explicite pour Railway.
startCommand = "node dist/main.js"
