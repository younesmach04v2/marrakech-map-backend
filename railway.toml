# Build explicite via Docker : l’image finale contient toujours `dist/`.
# https://docs.railway.com/reference/config-as-code
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Migrations puis API (idempotent). DATABASE_URL requis sur le service.
# Aligné avec le CMD du Dockerfile.
startCommand = "sh -c \"npx prisma migrate deploy && node dist/main.js\""
# Premier déploiement : SEED_ADMIN_ON_BOOT=true, puis false.
